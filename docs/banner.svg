<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="SAP S/4HANA RISE Security Scanner — offline config review: load, modules, checks, rank, report">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e17"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="conn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16223d"/>
      <stop offset="1" stop-color="#0e1a30"/>
    </linearGradient>
    <linearGradient id="strat1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.82"/>
      <stop offset="0.55" stop-color="#6366f1" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="strat2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="strat3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3a8a" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#3730a3" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.4" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card"><rect x="0" y="0" width="800" height="240" rx="18"/></clipPath>
    <style>
      .wm  { font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
      .mono{ font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .cap { font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size: 8px; fill: #93a6c4; }
      .nl  { font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size: 8.5px; fill: #e6edf8; }
    </style>
  </defs>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="800" height="240" fill="url(#bg)"/>
    <rect x="0" y="0" width="800" height="240" fill="url(#glow)"/>

    <!-- ===== Wordmark ===== -->
    <g transform="translate(40,44)">
      <path d="M0 -14 L21 -20 L42 -14 L42 5 Q42 21 21 31 Q0 21 0 5 Z" fill="url(#node)" stroke="url(#accent)" stroke-width="1.7"/>
      <path d="M9 4 L18 13 L33 -5" fill="none" stroke="#34d399" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="62" y="8" class="wm" font-size="26" font-weight="700" fill="#e8eff8">SAP S/4HANA <tspan fill="url(#accent)">RISE</tspan></text>
      <text x="63" y="27" class="mono" font-size="10" letter-spacing="1.9" fill="#8aa0be">SECURITY SCANNER · OFFLINE CONFIG REVIEW</text>
    </g>

    <!-- ===== Top-right meta ===== -->
    <g text-anchor="end">
      <rect x="700" y="30" width="60" height="20" rx="10" fill="rgba(129,140,248,0.12)" stroke="#818cf8" stroke-width="1"/>
      <text x="730" y="44" class="mono" font-size="11" fill="#a5b4fc" text-anchor="middle">v2.0</text>
      <text x="760" y="63" class="mono" font-size="8.5" fill="#7d93b2">19 MODULES · 278+ CHECKS</text>
    </g>

    <!-- ===== Offline export streams feeding LOAD ===== -->
    <text class="mono" x="170" y="99" font-size="7.5" fill="#6c83a1" text-anchor="middle">offline exports — no live RFC connection</text>
    <g class="mono" font-size="8.5" fill="#93a6c4" text-anchor="end">
      <text x="98" y="126">RSPARAM · RZ11</text>
      <text x="98" y="148">AGR_1251 · USR02</text>
      <text x="98" y="170">SM59 · SICF · BTP</text>
    </g>
    <g fill="none" stroke-width="2.2" stroke-linecap="round">
      <path d="M104 122 C130 122 140 148 165 148" stroke="#38bdf8"/>
      <path d="M104 144 C128 144 138 148 165 148" stroke="#818cf8"/>
      <path d="M104 166 C130 166 140 148 165 148" stroke="#a855f7"/>
    </g>

    <!-- ===== Pipeline connectors + arrows ===== -->
    <g stroke="url(#conn)" stroke-width="3" fill="none">
      <line x1="205" y1="148" x2="241" y2="148"/>
      <line x1="317" y1="148" x2="353" y2="148"/>
      <line x1="429" y1="148" x2="465" y2="148"/>
      <line x1="541" y1="148" x2="577" y2="148"/>
    </g>
    <g fill="#818cf8">
      <polygon points="249,148 241,143 241,153"/>
      <polygon points="361,148 353,143 353,153"/>
      <polygon points="473,148 465,143 465,153"/>
      <polygon points="585,148 577,143 577,153"/>
    </g>

    <!-- ===== Stage nodes: LOAD > MODULES > CHECKS > RANK > REPORT ===== -->
    <g text-anchor="middle">
      <!-- LOAD -->
      <g transform="translate(170,148)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <path d="M0 -13 L0 4 M-8 -4 L0 4 L8 -4" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="-10" y1="7" x2="10" y2="7" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
        <text x="0" y="17" class="nl">LOAD</text>
        <text x="0" y="34" class="cap">csv · json</text>
      </g>
      <!-- MODULES -->
      <g transform="translate(282,148)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <g fill="none" stroke="#818cf8" stroke-width="1.8">
          <rect x="-10" y="-13" width="8" height="8" rx="1.5"/><rect x="2" y="-13" width="8" height="8" rx="1.5"/>
          <rect x="-10" y="-1" width="8" height="8" rx="1.5"/><rect x="2" y="-1" width="8" height="8" rx="1.5"/>
        </g>
        <text x="0" y="17" class="nl">MODULES</text>
        <text x="0" y="34" class="cap">19 auditors</text>
      </g>
      <!-- CHECKS -->
      <g transform="translate(394,148)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <g stroke="#34d399" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M-12 -10 L-9 -7 L-4 -12"/><path d="M-12 -1 L-9 2 L-4 -3"/><path d="M-12 8 L-9 11 L-4 6"/>
        </g>
        <g stroke="#7d93b2" stroke-width="1.6" stroke-linecap="round">
          <line x1="0" y1="-9" x2="12" y2="-9"/><line x1="0" y1="0" x2="12" y2="0"/><line x1="0" y1="9" x2="12" y2="9"/>
        </g>
        <text x="0" y="17" class="nl">CHECKS</text>
        <text x="0" y="34" class="cap">278+ rules</text>
      </g>
      <!-- RANK -->
      <g transform="translate(506,148)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <g stroke-width="3.4" stroke-linecap="round">
          <line x1="-12" y1="10" x2="-12" y2="2" stroke="#38bdf8"/>
          <line x1="-4" y1="10" x2="-4" y2="-2" stroke="#fbbf24"/>
          <line x1="4" y1="10" x2="4" y2="-6" stroke="#fb923c"/>
          <line x1="12" y1="10" x2="12" y2="-11" stroke="#f43f5e"/>
        </g>
        <text x="0" y="17" class="nl">RANK</text>
        <text x="0" y="34" class="cap">severity · risk</text>
      </g>
      <!-- REPORT -->
      <g transform="translate(618,148)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <path d="M-9 -13 L5 -13 L11 -7 L11 11 L-9 11 Z" fill="none" stroke="#a5b4fc" stroke-width="1.7" stroke-linejoin="round"/>
        <path d="M5 -13 L5 -7 L11 -7" fill="none" stroke="#a5b4fc" stroke-width="1.4"/>
        <g stroke-width="2.4" stroke-linecap="round">
          <line x1="-4" y1="6" x2="-4" y2="2" stroke="#38bdf8"/>
          <line x1="1" y1="6" x2="1" y2="-1" stroke="#fb923c"/>
          <line x1="6" y1="6" x2="6" y2="-4" stroke="#f43f5e"/>
        </g>
        <text x="0" y="17" class="nl">REPORT</text>
        <text x="0" y="34" class="cap">html dashboard</text>
      </g>
    </g>

    <!-- ===== Compliance mapping handoff from REPORT ===== -->
    <path d="M648 133 C700 126 716 112 742 112" fill="none" stroke="#a5b4fc" stroke-width="1.8" stroke-dasharray="3 3"/>
    <circle cx="742" cy="112" r="2.2" fill="#a5b4fc"/>
    <g class="mono" font-size="8" fill="#a5b4fc" text-anchor="end">
      <text x="786" y="100">CIS SAP · DSAG</text>
      <text x="786" y="112">SAP Security Baseline</text>
    </g>

    <!-- ===== Layered SAP stack = the audited config surface ===== -->
    <text class="mono" x="400" y="192" font-size="7.5" fill="#6c83a1" text-anchor="middle">audited layers — auth · hana · btp · sod · crypto · code · fiori · logging · network</text>
    <g transform="translate(0,200)">
      <path d="M0 6 Q80 1 160 5 T320 5 T480 5 T640 5 T800 5 V44 H0 Z" fill="url(#strat3)"/>
      <path d="M0 12 Q80 7 160 11 T320 11 T480 11 T640 11 T800 11 V44 H0 Z" fill="url(#strat2)"/>
      <path d="M0 18 Q80 13 160 17 T320 17 T480 17 T640 17 T800 17 V44 H0 Z" fill="url(#strat1)"/>
      <g stroke="#0b1220" stroke-width="1.4" opacity="0.22">
        <line x1="100" y1="16" x2="100" y2="42"/><line x1="220" y1="16" x2="220" y2="42"/>
        <line x1="340" y1="16" x2="340" y2="42"/><line x1="460" y1="16" x2="460" y2="42"/>
        <line x1="580" y1="16" x2="580" y2="42"/><line x1="700" y1="16" x2="700" y2="42"/>
      </g>
      <path d="M0 18 Q80 13 160 17 T320 17 T480 17 T640 17 T800 17" fill="none" stroke="#c7d2fe" stroke-width="1" opacity="0.5"/>
    </g>
  </g>
  <rect x="0.75" y="0.75" width="798.5" height="238.5" rx="17.5" fill="none" stroke="#243553"/>
</svg>
